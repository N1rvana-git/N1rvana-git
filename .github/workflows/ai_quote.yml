name: Update README with AI Quote

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0 点执行
  workflow_dispatch: # 允许手动执行

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai python-dotenv requests

      - name: Run Python Script (Sentinel Core)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/update_readme.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "AI-Sentinel-Bot"
          git config --global user.email "bot@cyber-terminal.null"
          git add README.md
          git commit -m "⚡ Sync: AI Core Sentinel Daily Quote Update" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}